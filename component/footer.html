<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../css/style.css">
    <style>
        *{
            padding: 0;
            margin: 0;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <footer>
        <div class="footer-col">
            <div class="logo-footer">
                <img src="../assets/img/logo_BA.png" alt="Logo">
                <label class="text-color-primary">Tiketqu<span>.com</span></label>
            </div>
            <p>Platform terpercaya untuk pembelian tiket event terbaik dengan kemudahan akses dan keamanan transaksi.</p>
        </div>

        <div class="footer-col">
            <h3>Navigasi</h3>
            <ul>
                <li><a href="#">Dashboard</a></li>
                <li><a href="#">Katalog Event</a></li>
                <li><a href="#">Tentang Kami</a></li>
            </ul>
        </div>

        <div class="footer-col">
            <h3>Kontak</h3>
            <p>Email: support@tiketqu.com</p>
            <p>WhatsApp: +62 812-3456-7890</p>
        </div>

        <div class="footer-col">
            <h3>Ikuti Kami</h3>
            <div class="social-links">
                <a href="#">Instagram</a>
                <a href="#">Twitter</a>
                <a href="#">Facebook</a>
            </div>
        </div>

        <div class="footer-col">
            <h3>Hubungi Kami</h3>
            <form action="#" class="contact-form">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" placeholder="Alamat email Anda">
                
                <label for="message">Pesan</label>
                <textarea id="message" name="message" rows="3" placeholder="Tulis pesan Anda..."></textarea>
                
                <button type="submit" class="bg-primary text-color-light">Kirim Pesan</button>
            </form>
        </div>
    </footer>
</body>
</html>
